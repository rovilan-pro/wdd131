<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review Form</title>

    <meta name="description"
        content="Project for WDD131 for a product review form by Rovilan Alec Dela Torre">
    <meta name="author" content="Rovilan Alec Dela Torre">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Roboto&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles/form.css">
    <link rel="stylesheet" href="styles/form-small.css">

    <script src="scripts/form.js" defer></script>
</head>
<body>

<header>
    <h1>Product Review Form</h1>
</header>

<main>
    <form method="get" action="review.html">

        <div class="form-group">
            <label for="product">Product Name *</label>
            <select id="product" name="product" required>
                <option value="" disabled selected>
                    Select a Product ...
                </option>
            </select>
        </div>

<fieldset> 
    <legend>Overall Rating *</legend> 
    <input type="radio" id="rating1" name="rating" value="1" required> <label for="rating1">☆</label> 
    <input type="radio" id="rating2" name="rating" value="2" required> <label for="rating2">☆☆</label> 
    <input type="radio" id="rating3" name="rating" value="3" required> <label for="rating3">☆☆☆</label> 
    <input type="radio" id="rating4" name="rating" value="4" required> <label for="rating4">☆☆☆☆</label> 
    <input type="radio" id="rating5" name="rating" value="5" required> <label for="rating5">☆☆☆☆☆</label> 
</fieldset>

        <div class="form-group">
            <label for="installDate">Date of Installation *</label>
            <input type="date" id="installDate" name="installDate" required>
        </div>

        <fieldset>
            <legend>Useful Features (Check all that apply)</legend>

            <input type="checkbox" id="durability" name="features" value="Durability">
            <label for="durability">Durability</label>

            <input type="checkbox" id="ease" name="features" value="Ease of Use">
            <label for="ease">Ease of Use</label>

            <input type="checkbox" id="performance" name="features" value="Performance">
            <label for="performance">Performance</label>

            <input type="checkbox" id="design" name="features" value="Design">
            <label for="design">Design</label>
        </fieldset>

        <div class="form-group">
            <label for="review">Written Review</label>
            <textarea id="review" name="review" rows="5"></textarea>
        </div>

        <div class="form-group">
            <label for="username">User Name</label>
            <input type="text" id="username" name="username">
        </div>

        <input type="submit" value="Submit Review">

    </form>
</main>

<footer>
    <p> 
        &copy;
         <span id="currentyear"></span> 
         Ⓒ 🏝️ Rovilan Alec Dela Torre 🏝️ Philippines
    </p>
  
    <p id="lastModified"></p>
</footer>

</body>
</html>
